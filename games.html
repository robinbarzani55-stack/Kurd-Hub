<!DOCTYPE html>
<html>
    <head>
        <title>Kurd Hub</title>

        <meta charset = "utf-8">
		<link rel = "shortcut icon" type = "image/x-icon" href="Logo.ico" />

		<meta name = "author" content = "Kurd Hub" />
		<meta name = "description" content = "Kurd Hub" />
		<meta name = "keywords" content = "Kurd, Hub, kurd Hub, script, lua, krnl" />

		<meta property = "og:title" content = "Kurd Hub" />
		<meta property = "og:description" content = "Official website for Kurd Hub" />
		<meta property = "og:type" content = "website" />
		<meta property = "og:url" content = "https://owlhub.ga" />
		<meta property = "og:secure_url" content = "https://owlhub.ga">
		<meta property = "og:image" content = "https://www.institutkurde.org/en/kurdorama/kurdistan/kurdistan_flag.gif" />

        <style>
            body {
				background-color: rgb(25, 25, 25);
                color: white;
                font-family: "Trebuchet MS";
			}

            body::-webkit-scrollbar {
                width: 12px;
            }
      
            body::-webkit-scrollbar-thumb {
                background-color: rgb(80, 80, 80);
            }

            #gamesLabel {
                background-color: rgb(25, 25, 25); 
                color: rgb(255, 255, 255);
                border: 0px;
                text-align: center;
            }
        </style>
    </head>
    <body>
        <center>
            <h4 id="gamesLabel"></h20>
            <br>
            <br>
        </center>

        <script type="text/javascript">
            const gamesBox = document.getElementById("gamesLabel");

            const games = new XMLHttpRequest();
            const gamesURL = "https://github.com/robinbarzani55-stack/Kurd-Hub/blob/main/games.txt";
            games.open("GET", gamesURL, true);
            games.send();

            games.onreadystatechange = () => {
                gamesBox.innerText = games.responseText;
            }
        </script>
    </body>
</html>
